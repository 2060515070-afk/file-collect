{% extends "base.html" %}

{% block title %}出错了 - FileCollect{% endblock %}

{% block content %}
<div class="min-h-[60vh] flex items-center justify-center">
    <div class="glass-strong p-10 text-center max-w-md animate-fade-in-up">
        <div class="text-6xl mb-4">😵</div>
        <h1 class="text-2xl font-bold text-white mb-3">出错了</h1>
        <p class="text-slate-400 mb-6">{{ message | default('发生了未知错误') }}</p>
        <div class="flex flex-col sm:flex-row gap-3 justify-center">
            <a href="{{ url_for('index') }}" class="btn-primary">返回首页</a>
            <button onclick="history.back()" class="btn-ghost">返回上页</button>
        </div>
    </div>
</div>
{% endblock %}
