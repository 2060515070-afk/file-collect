{% extends "base.html" %}

{% block title %}管理员登录 - FileCollect{% endblock %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center">
    <div class="glass-strong p-8 w-full max-w-md animate-fade-in-up">
        <div class="text-center mb-6">
            <div class="text-4xl mb-3">🔐</div>
            <h1 class="text-2xl font-bold text-white">管理员登录</h1>
            <p class="text-slate-400 text-sm mt-1">输入密码以管理收集任务</p>
        </div>

        <form method="POST" action="{{ url_for('admin_login') }}">
            <div class="mb-4">
                <label class="block text-sm text-slate-400 mb-2">管理密码</label>
                <input type="password" name="password" class="input-field"
                       placeholder="请输入管理员密码" autofocus required>
            </div>

            <button type="submit" class="btn-primary w-full py-3 text-base">
                登录
            </button>
        </form>

        <div class="text-center mt-6">
            <a href="{{ url_for('index') }}" class="text-sm text-slate-500 hover:text-slate-300 transition-colors">
                ← 返回首页
            </a>
        </div>
    </div>
</div>
{% endblock %}
